name: Deploy TeaVM to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
  group: pages-deployment
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build TeaVM
        run: ./gradlew :teavm:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: teavm/build/dist/webapp/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
